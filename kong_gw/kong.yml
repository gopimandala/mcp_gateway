_format_version: "3.0"

services:
  # - name: my-service
  #   url: http://httpbin.org
  #   plugins:
  #     - name: rate-limiting
  #       config:
  #         minute: 5
  #         hour: 100

  - name: jira-service
    url: http://172.17.0.1:${MCP_PORT:-8020}
    # plugins:
    #   - name: request-size-limiting
    #     config:
    #       allowed_payload_size: 1

  - name: jira-proxy-service
    url: http://172.17.0.1:${HTTP_WRAPPER_PORT:-8080}
    plugins:
    - name: pre-function
      config:
        access:
        - |
          local body = kong.request.get_raw_body()
          if body and string.find(string.lower(body), "delete") then
            return kong.response.exit(403, "Blocked by Kong policy\n", { ["Content-Type"] = "text/plain" })
          end
    # plugins:
    #   - name: request-size-limiting
    #     config:
    #       allowed_payload_size: 10

routes:
  # - name: my-route
  #   service: my-service
  #   paths:
  #     - /my-api

  - name: jira-route
    service: jira-service
    paths:
      - /jira
    strip_path: true

  - name: jira-proxy-route
    service: jira-proxy-service
    paths:
      - /api/jira
    strip_path: false      
    preserve_host: true